<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATRIX_DASHBOARD // v2.0</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=M+PLUS+1+Code:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="monitor">
            <div class="screen">
                <div class="glitch-layer"></div>
                <div class="content" id="terminal-content">
                    <!-- Content will be injected by script.js -->
                </div>
                <div class="overlay">
                    <div class="scanlines"></div>
                    <div class="vignette"></div>
                </div>
            </div>
        </div>
    </div>
    <div class="controls">
        <button id="stable-toggle">STABLE MODE: OFF</button>
        <button id="sound-toggle">SOUND: OFF</button>
    </div>
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
